{% extends "base.html" %} 
{% load crispy_forms_tags %} 

{% block title %}ForgotYour Password?{% endblock title %} 

{% block content %}
<h2>Forgot your password?</h2>
<p>
  Enter your email address below, and we'll email instructions for setting a new one.
</p>
<form method="POST">
  {% csrf_token %} {{ form|crispy }}
  <input class="btn btn-success" id="passwordResetBtn" type="submit" value="Send me instructions!" />
</form>
{% endblock content %}
